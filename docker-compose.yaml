# for local testing

services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: abtests
      POSTGRES_USER: abtests
      POSTGRES_PASSWORD: abtests
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U abtests" ]
      interval: 2s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: secretsmanager
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:4566/_localstack/health" ]
      interval: 2s
      timeout: 5s
      retries: 10

  init-secrets:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-central-1
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        aws --endpoint-url=http://localstack:4566 secretsmanager create-secret \
          --name rds-credentials \
          --secret-string '{"host":"postgres","port":"5432","dbname":"abtests","username":"abtests","password":"abtests"}'

  ab-test-lambda:
    build: /Users/clipka/IdeaProjects/hiring-challenge
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      init-secrets:
        condition: service_completed_successfully
    environment:
      DB_SECRET_ARN: arn:aws:secretsmanager:eu-central-1:000000000000:secret:rds-credentials
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-central-1
      DB_SSLMODE: disable
    healthcheck:
      test: [ "CMD", "curl", "-sf", "-X", "POST", "-d", "{}", "-H", "Content-Type: application/json", "http://localhost:8080/2015-03-31/functions/function/invocations" ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5s

  service-curl:
    image: curlimages/curl:latest
    depends_on:
      ab-test-lambda:
        condition: service_healthy
    entrypoint: [ "sh", "-c" ]
    volumes:
       - ./sample-requests:/data
    command:
      - |
        echo "Sending test events...";
        curl -X POST -d "@/data/request1.json" --url http://ab-test-lambda:8080/2015-03-31/functions/function/invocations -H "Content-Type: application/json"
        curl -X POST -d "@/data/request2.json" --url http://ab-test-lambda:8080/2015-03-31/functions/function/invocations -H "Content-Type: application/json"
        curl -X POST -d "@/data/request3.json" --url http://ab-test-lambda:8080/2015-03-31/functions/function/invocations -H "Content-Type: application/json"